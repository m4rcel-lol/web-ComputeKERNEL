<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ComputeKERNEL | System Boot</title>
    <style>
        :root {
            --term-green: #00ff41;
            --term-dim: #003b00;
            --bg-black: #0a0a0a;
        }

        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--bg-black);
            color: var(--term-green);
            font-family: 'Courier New', Courier, monospace;
            height: 100%;
            overflow: hidden;
            font-size: 14px;
        }

        /* Scanline Effect */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 10;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        #terminal {
            padding: 20px;
            height: calc(100vh - 40px);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .history {
            white-space: pre-wrap;
            word-break: break-all;
        }

        .input-line {
            display: flex;
            margin-top: 5px;
        }

        .prompt {
            white-space: nowrap;
            margin-right: 10px;
        }

        input {
            background: transparent;
            border: none;
            color: var(--term-green);
            font-family: inherit;
            font-size: inherit;
            outline: none;
            flex-grow: 1;
            caret-color: var(--term-green);
        }

        /* Hide Scrollbar */
        #terminal::-webkit-scrollbar { display: none; }
        #terminal { -ms-overflow-style: none; scrollbar-width: none; }

        .boot-text { color: #fff; }
        .error-text { color: #ff5555; }
    </style>
</head>
<body>

    <div id="terminal">
        <div id="output" class="history"></div>
        <div class="input-line" id="input-container" style="display: none;">
            <span class="prompt" id="prompt-label"></span>
            <input type="text" id="cmd-input" autofocus spellcheck="false" autocomplete="off">
        </div>
    </div>

    <input type="file" id="file-import" style="display: none;" accept=".ckernel">

    <script>
        const output = document.getElementById('output');
        const cmdInput = document.getElementById('cmd-input');
        const promptLabel = document.getElementById('prompt-label');
        const inputContainer = document.getElementById('input-container');
        const fileImport = document.getElementById('file-import');

        // --- KERNEL STATE ---
        let systemState = {
            user: "user",
            hostname: "computekernel",
            history: [],
            vfs: {
                "/": ["bin", "home", "etc", "tmp"],
                "/home": ["user"],
                "/etc": ["version.txt"]
            }
        };

        const updatePrompt = () => {
            promptLabel.textContent = `{${systemState.user}@${systemState.hostname}} #`;
        };

        const print = (text, className = "") => {
            const div = document.createElement('div');
            div.textContent = text;
            if (className) div.className = className;
            output.appendChild(div);
            document.getElementById('terminal').scrollTop = document.getElementById('terminal').scrollHeight;
        };

        // --- BOOT SEQUENCE ---
        const bootLines = [
            "ComputeKERNEL(TM) Boot Loader v1.0.4",
            "Detected Hardware: Virtual Browser V8 Engine",
            "Loading modules: [fs, network, crypto, shell]",
            "Mounting VFS... DONE",
            "Initializing persistence bridge... OK",
            "System check complete. Starting ComputeKERNEL Shell.",
            "--------------------------------------------------",
            "Type 'help' to see available commands."
        ];

        async function boot() {
            for (let line of bootLines) {
                print(line, line.startsWith("Compute") ? "boot-text" : "");
                await new Promise(r => setTimeout(r, 120));
            }
            inputContainer.style.display = 'flex';
            updatePrompt();
            cmdInput.focus();
        }

        // --- COMMAND LOGIC ---
        const commands = {
            help: () => "Available commands: ls, whoami, clear, export_save, import_save, echo, hostname",
            whoami: () => systemState.user,
            hostname: (args) => {
                if(args[0]) {
                    systemState.hostname = args[0];
                    updatePrompt();
                    return `Hostname changed to ${args[0]}`;
                }
                return systemState.hostname;
            },
            ls: () => "bin/  home/  etc/  tmp/  system_logs.log",
            clear: () => {
                output.innerHTML = '';
                return null;
            },
            echo: (args) => args.join(' '),
            export_save: () => {
                const blob = new Blob([JSON.stringify(systemState)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `session_${Date.now()}.ckernel`;
                a.click();
                return "System state exported to .ckernel file.";
            },
            import_save: () => {
                fileImport.click();
                return "Opening system bridge for import...";
            }
        };

        cmdInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const rawLine = cmdInput.value.trim();
                const [cmd, ...args] = rawLine.split(' ');
                
                print(`${promptLabel.textContent} ${rawLine}`);

                if (cmd && commands[cmd]) {
                    const result = commands[cmd](args);
                    if (result) print(result);
                } else if (cmd) {
                    print(`kernel: command not found: ${cmd}`, "error-text");
                }

                cmdInput.value = '';
            }
        });

        // --- FILE IMPORT HANDLER ---
        fileImport.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                try {
                    const imported = JSON.parse(event.target.result);
                    systemState = imported;
                    updatePrompt();
                    print("[SYSTEM] Kernel state successfully restored.", "boot-text");
                } catch (err) {
                    print("[ERROR] Failed to parse .ckernel image.", "error-text");
                }
            };
            reader.readAsText(file);
        });

        // Start system
        boot();
    </script>
</body>
</html>
