<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ComputeKERNEL</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="terminal">
    <div id="output"></div>

    <div id="input-line">
      <span id="prompt"></span>
      <input id="input" autocomplete="off" autofocus />
    </div>
  </div>

  <div id="overlay" class="hidden"></div>

  <!-- IMPORTANT: defer prevents early execution issues -->
  <script src="script.js" defer></script>
</body>
</html>
